<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamPulse PRO+ (FIXED)</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:#ffffff}

/* 🔥 texto blanco global */
*{color:#ffffff}
  h6 {
            color: green;
        }

/* inputs y botones */
input, .form-control{background:#1e293b;color:#ffffff;border:1px solid #334155}
button{color:#ffffff}

/* placeholder */
::placeholder{color:#94a3b8}
.card{background:#1e293b;border-radius:16px;padding:15px;margin-bottom:15px}
.search-container{position:relative}
.search-results{position:absolute;width:100%;z-index:1000;max-height:200px;overflow:auto;border-radius:10px}
.search-item:hover{background:#38bdf8;color:#000;cursor:pointer}
.favorite{cursor:pointer}
.badge-live{font-size:12px;margin-left:5px}
</style>
</head>
<body>

<div class="container py-4">

<div class="search-container mb-3">
<div class="input-group">
<input id="search" class="form-control" placeholder="Buscar juego...">
<button id="toggleResults" class="btn btn-secondary">▼</button>
</div>
<div id="results" class="search-results bg-dark d-none"></div>
</div>

<div class="card">
<h6>⭐ Favoritos</h6>
<div id="favorites"></div>
</div>

<div class="card">
<h6>🎮 Juegos activos</h6>
<div id="activeGames"></div>
</div>

<div class="card">
<h6>📊 Estadísticas</h6>
<div id="stats"></div>
</div>

<div class="card">
<canvas id="chart" height="120"></canvas>
</div>

</div>

<script>
const API_SEARCH="https://store.steampowered.com/api/storesearch/?l=spanish&cc=US&term=";
const API_PLAYERS="https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=";

const COLORS=["#38bdf8","#f472b6","#34d399","#facc15","#fb7185","#a78bfa"];

// ✅ FIX PROXIES (error corregido)
const PROXIES=[
 (url)=>url,
 (url)=>"https://api.allorigins.win/raw?url="+encodeURIComponent(url),
 (url)=>"https://corsproxy.io/?"+encodeURIComponent(url)
];

let chart;
let datasetsMap={};
let labels=[];
let interval=null;

let favorites=JSON.parse(localStorage.getItem("favGames")||"[]");

function saveFavorites(){
 localStorage.setItem("favGames",JSON.stringify(favorites));
 renderFavorites();
}

// ✅ FIX: función corregida (había un cierre extra)
function renderFavorites(){
 const box=document.getElementById("favorites");
 box.innerHTML="";

 favorites.forEach((g,index)=>{
  const div=document.createElement("div");
  div.className="d-inline-flex align-items-center m-1";

  div.innerHTML=`
   <button class="btn btn-sm btn-outline-info me-1">${g.name}</button>
   <button class="btn btn-sm btn-danger">✕</button>
  `;

  div.querySelector(".btn-outline-info").onclick=()=>addGame(g);

  div.querySelector(".btn-danger").onclick=()=>{
   favorites.splice(index,1);
   saveFavorites();
  };

  box.appendChild(div);
 });
}

function renderActive(){
 const box=document.getElementById("activeGames");
 box.innerHTML="";

 Object.entries(datasetsMap).forEach(([id,g])=>{
  const div=document.createElement("div");
  div.className="d-flex justify-content-between align-items-center mb-1";

  div.innerHTML=`
   <span>${g.label} <span class="badge bg-info badge-live">${g.data.at(-1)||0}</span></span>
   <button class="btn btn-sm btn-danger">X</button>
  `;

  div.querySelector("button").onclick=()=>{
   delete datasetsMap[id];
   updateChart();
   renderActive();
  };

  box.appendChild(div);
 });
}

function renderStats(){
 const box=document.getElementById("stats");
 box.innerHTML="";

 Object.values(datasetsMap).forEach(g=>{
  const data=g.data;
  if(data.length<2) return;

  const last=data.at(-1);
  const prev=data.at(-2);
  const trend= last>prev ? "📈" : last<prev ? "📉" : "➡️";

  const div=document.createElement("div");
  div.textContent=`${g.label}: ${last} ${trend}`;
  box.appendChild(div);
 });
}

async function fetchSteam(url){
 for(let build of PROXIES){
  try{
   const res=await fetch(build(url));
   const text=await res.text();
   return JSON.parse(text);
  }catch{}
 }
 return null;
}

window.addEventListener("DOMContentLoaded",()=>{
 const input=document.getElementById("search");
 const results=document.getElementById("results");
 const toggle=document.getElementById("toggleResults");

 toggle.onclick=()=>results.classList.toggle("d-none");

 document.addEventListener("click",e=>{
  if(!e.target.closest(".search-container")){
   results.classList.add("d-none");
  }
 });

 input.addEventListener("input",debounce(async e=>{
  const term=e.target.value.trim();
  if(term.length<3){results.classList.add("d-none");return;}

  const data=await fetchSteam(API_SEARCH+term);
  if(!data||!data.items)return;

  results.innerHTML="";

  data.items.forEach(g=>{
   const div=document.createElement("div");
   div.className="search-item p-2 border-bottom d-flex justify-content-between";
   div.innerHTML=`${g.name} <span class='favorite'>⭐</span>`;

   div.onclick=()=>{addGame(g);results.classList.add("d-none");};

   div.querySelector(".favorite").onclick=(ev)=>{
    ev.stopPropagation();
    if(!favorites.find(f=>f.id===g.id)){
     favorites.push(g);
     saveFavorites();
    }
   };

   results.appendChild(div);
  });

  results.classList.remove("d-none");
 },500));

 initChart();
 renderFavorites();
});

function addGame(game){
 if(datasetsMap[game.id]) return;

 const color=COLORS[Object.keys(datasetsMap).length % COLORS.length];

 datasetsMap[game.id]={
  label:game.name,
  data:[],
  borderColor:color,
  backgroundColor:color,
  borderWidth:2
 };

 updateChart();
 renderActive();

 if(!interval){
  update();
  interval=setInterval(update,30000);
 }
}

function initChart(){
 const ctx=document.getElementById("chart");
 chart=new Chart(ctx,{
  type:"line",
  data:{labels:labels,datasets:[]},
  options:{responsive:true}
 });
}

function updateChart(){
 chart.data.datasets=Object.values(datasetsMap);
 chart.update();
}

async function update(){
 labels.push(new Date().toLocaleTimeString());

 for(let id in datasetsMap){
  const data=await fetchSteam(API_PLAYERS+id);
  const count=data?.response?.player_count||0;

  datasetsMap[id].data.push(count);
  if(datasetsMap[id].data.length>20) datasetsMap[id].data.shift();
 }

 if(labels.length>20) labels.shift();

 updateChart();
 renderActive();
 renderStats();
}

function debounce(fn,delay){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),delay)}}

// ✅ TESTS básicos
console.assert(Array.isArray(PROXIES),"PROXIES debe ser array");
console.assert(typeof PROXIES[0]==="function","PROXIES debe contener funciones");
</script>

</body>
</html>
